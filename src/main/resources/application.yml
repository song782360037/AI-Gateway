spring:
  application:
    name: AI-Gateway
  profiles:
    active: local

  # WebFlux 请求体缓冲区限制（默认 256KB，AI 模型请求体较大需调高）
  codec:
    max-in-memory-size: 10MB

  # 优雅停机：等待在途请求完成
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # MySQL 数据源（管理接口 + Flyway 使用）
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_gateway}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    encoding: UTF-8

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      database: 0
      timeout: 5000ms

# API Key 加密密钥（32 字节 hex 编码，64 个十六进制字符）
gateway:
  security:
    api-key-secret: ${GATEWAY_API_KEY_SECRET:}

  auth:
    enabled: true # API Key 认证开关，true 时对 /v1/** 路径强制校验

  # 管理后台 JWT 认证
  admin-auth:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
    jwt-expiration-ms: 86400000       # Token 有效期（毫秒），默认 24 小时

  # 全局重试配置（流式和非流式统一）
  # 流式请求仅在首个 token 到达前重试，避免数据重复
  retry:
    max-retries: 3 # 最大重试次数（不含首次请求）
    initial-interval-ms: 1000 # 初始退避间隔
    max-interval-ms: 30000 # 最大退避间隔

  # CORS 跨域配置
  cors:
    enabled: true
    allowed-origins: "*"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed-headers: "*"
    allow-credentials: false
    max-age-seconds: 3600

  # 限流配置
  rate-limit:
    enabled: true
    default-rpm: 60
    default-hourly-rpm: 3600

  # 熔断器配置
  circuit-breaker:
    enabled: true
    sliding-window-size: 10
    failure-rate-threshold: 50.0
    slow-call-duration-ms: 10000
    slow-call-rate-threshold: 80.0
    wait-duration-in-open-state-ms: 60000
    permitted-number-of-calls-in-half-open-state: 5
    minimum-number-of-calls: 5

# 优雅停机
server:
  shutdown: graceful

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus # 暴露健康检查、应用信息和 Prometheus 指标端点
  endpoint:
    health:
      show-details: when-authorized # 认证后显示详细健康信息
      show-components: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0

# SpringDoc OpenAPI 文档配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.code.aigateway
  default-flat-param-object: true
